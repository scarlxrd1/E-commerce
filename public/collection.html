<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AURA | The Collection</title>
    
    <!-- Google Fonts: Playfair Display (Serif) & Inter (Sans-Serif) -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500&family=Playfair+Display:ital,wght@0,400;0,500;0,600;1,400&display=swap" rel="stylesheet">
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        serif: ['"Playfair Display"', 'serif'],
                        sans: ['"Inter"', 'sans-serif'],
                    },
                    colors: {
                        cream: '#FAFAFA',
                    }
                }
            }
        }
    </script>
    <style>
        body { 
            background-color: #FAFAFA; 
            overflow-x: hidden;
        }
        
        /* Custom Scroll Animation Classes */
        .fade-in-up {
            opacity: 0;
            transform: translateY(40px);
            transition: opacity 1s cubic-bezier(0.16, 1, 0.3, 1), transform 1s cubic-bezier(0.16, 1, 0.3, 1);
        }
        .fade-in-up.is-visible {
            opacity: 1;
            transform: translateY(0);
        }

        /* Hide number input arrows for minimal design */
        input[type="number"]::-webkit-inner-spin-button,
        input[type="number"]::-webkit-outer-spin-button {
            -webkit-appearance: none;
            margin: 0;
        }
        input[type="number"] {
            -moz-appearance: textfield;
        }
    </style>
</head>
<body class="font-sans text-stone-900 antialiased selection:bg-stone-200 selection:text-stone-900">

    <!-- ========================================== -->
    <!-- DYNAMIC NAVBAR PLACEHOLDER -->
    <!-- ========================================== -->
    <div id="navbar-container"></div>

    <!-- Header & Filters -->
    <header class="max-w-[1600px] mx-auto px-6 md:px-12 pt-24 pb-16">
        <div class="flex flex-col items-center text-center">
            <h1 data-i18n="collection.title" class="font-serif text-5xl md:text-7xl text-stone-900 mb-6">The Collection</h1>
            <!-- Counter will be updated dynamically by JS -->
            <p data-i18n="collection.loading" class="font-sans text-stone-500 text-sm tracking-widest uppercase mb-12" id="item-count">Loading collection...</p>
            
            <!-- Category Filters -->
            <div class="flex flex-wrap justify-center gap-8 md:gap-16 border-b border-stone-200 pb-px w-full max-w-2xl mb-8">
                <button data-i18n="collection.filters.all" class="filter-btn font-sans text-sm tracking-widest uppercase pb-4 border-b-2 border-stone-900 text-stone-900 transition-colors" data-filter="all">All</button>
                <button data-i18n="collection.filters.seating" class="filter-btn font-sans text-sm tracking-widest uppercase pb-4 border-b-2 border-transparent text-stone-400 hover:text-stone-900 transition-colors" data-filter="seating">Seating</button>
                <button data-i18n="collection.filters.tables" class="filter-btn font-sans text-sm tracking-widest uppercase pb-4 border-b-2 border-transparent text-stone-400 hover:text-stone-900 transition-colors" data-filter="tables">Tables</button>
                <button data-i18n="collection.filters.lighting" class="filter-btn font-sans text-sm tracking-widest uppercase pb-4 border-b-2 border-transparent text-stone-400 hover:text-stone-900 transition-colors" data-filter="lighting">Lighting</button>
                <button data-i18n="collection.filters.decor" class="filter-btn font-sans text-sm tracking-widest uppercase pb-4 border-b-2 border-transparent text-stone-400 hover:text-stone-900 transition-colors" data-filter="decor">Decor</button>
            </div>

            <!-- Price Filter -->
            <div class="flex flex-wrap justify-center items-center gap-4 w-full max-w-2xl">
                <span data-i18n="collection.price_range" class="font-sans text-xs tracking-widest uppercase text-stone-500 mr-2 hidden sm:inline-block">Price Range</span>
                <input data-i18n="collection.min_price" type="number" id="min-price" placeholder="Min €" class="w-24 bg-transparent border-b border-stone-300 py-1 px-2 font-sans text-sm text-stone-900 placeholder-stone-400 focus:outline-none focus:border-stone-900 transition-colors text-center">
                <span class="text-stone-300">-</span>
                <input data-i18n="collection.max_price" type="number" id="max-price" placeholder="Max €" class="w-24 bg-transparent border-b border-stone-300 py-1 px-2 font-sans text-sm text-stone-900 placeholder-stone-400 focus:outline-none focus:border-stone-900 transition-colors text-center">
                <button data-i18n="collection.apply" id="apply-price-filter" class="font-sans text-xs tracking-widest uppercase border border-stone-900 text-stone-900 px-6 py-2 hover:bg-stone-900 hover:text-white transition-colors ml-2">Apply</button>
            </div>
        </div>
    </header>

    <!-- Product Grid -->
    <main class="max-w-[1600px] mx-auto px-6 md:px-12 pb-32">
        <!-- Empty container ready for Firebase injection -->
        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-x-8 lg:gap-x-16 gap-y-24" id="product-grid">
            <!-- Products will be generated here by collection.js -->
        </div>
    </main>

    <!-- ========================================== -->
    <!-- DYNAMIC FOOTER PLACEHOLDER -->
    <!-- ========================================== -->
    <div id="footer-container"></div>

    <!-- Global Scripts (Cart & Nav logic) -->
    <script type="module" src="./js/global.js"></script>
    
    <!-- Main Script for this specific page (Firebase & Grid Logic) -->
    <script type="module" src="./js/collection.js"></script>
</body>
</html>
