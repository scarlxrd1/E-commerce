<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AURA | Luxury Interior Design</title>
    
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;0,600;1,400&family=Plus+Jakarta+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        serif: ['"Playfair Display"', 'serif'],
                        sans: ['"Plus Jakarta Sans"', 'sans-serif'],
                    },
                    colors: {
                        cream: '#FBFBFA',
                    }
                }
            }
        }
    </script>
    <style>
        html { scroll-behavior: smooth; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
</head>
<body class="font-sans text-stone-900 bg-cream antialiased selection:bg-stone-200 selection:text-stone-900">

    <!-- ========================================== -->
    <!-- DYNAMIC NAVBAR PLACEHOLDER -->
    <!-- ========================================== -->
    <div id="navbar-container"></div>

    <!-- Editorial Hero Section -->
    <section class="flex flex-col md:flex-row min-h-[85vh]">
        <div class="w-full md:w-1/2 flex flex-col justify-center items-start px-8 md:px-16 lg:px-24 py-16 md:py-0 bg-cream">
            <span data-i18n="home.new_collection" class="font-sans text-xs tracking-[0.2em] uppercase text-stone-500 mb-6">New Collection</span>
            <h1 data-i18n="home.hero_title" class="font-serif text-5xl md:text-6xl lg:text-7xl leading-[1.1] text-stone-900 mb-8">
                Elevate Your <br/><span class="italic text-stone-600">Space.</span>
            </h1>
            <p data-i18n="home.hero_subtitle" class="font-sans text-stone-500 max-w-md mb-10 leading-relaxed">
                Discover our curated collection of minimalist furniture. Crafted with sustainable materials and designed for the modern sanctuary.
            </p>
            <a href="collection.html" class="group flex items-center gap-4 border-b border-stone-900 pb-2 text-stone-900 hover:text-stone-600 hover:border-stone-600 transition-colors">
                <span data-i18n="home.explore" class="font-sans text-sm tracking-widest uppercase">Explore Collection</span>
                <svg class="w-4 h-4 transform group-hover:translate-x-1 transition-transform" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M17 8l4 4m0 0l-4 4m4-4H3"></path></svg>
            </a>
        </div>
        <div class="w-full md:w-1/2 relative min-h-[50vh] md:min-h-full bg-stone-100">
            <img src="https://images.unsplash.com/photo-1600210492486-724fe5c67fb0?auto=format&fit=crop&w=1200&q=80" alt="Minimalist Japandi Interior" class="absolute inset-0 w-full h-full object-cover">
        </div>
    </section>

    <!-- The Shop (Product Grid) -->
    <section id="shop" class="max-w-[1400px] mx-auto px-6 md:px-12 py-24">
        <div class="flex flex-col items-center mb-16">
            <h2 data-i18n="home.curated_pieces" class="font-serif text-3xl md:text-4xl text-stone-900 mb-10">Curated Pieces</h2>
            <div class="flex flex-wrap justify-center gap-6 md:gap-12">
                <button data-i18n="home.filters.all" class="filter-btn font-sans text-xs md:text-sm tracking-widest uppercase border-b border-stone-900 text-stone-900 pb-1 transition-all" data-category="all">All</button>
                <button data-i18n="home.filters.seating" class="filter-btn font-sans text-xs md:text-sm tracking-widest uppercase border-b border-transparent text-stone-500 hover:text-stone-900 transition-all" data-category="seating">Seating</button>
                <button data-i18n="home.filters.tables" class="filter-btn font-sans text-xs md:text-sm tracking-widest uppercase border-b border-transparent text-stone-500 hover:text-stone-900 transition-all" data-category="tables">Tables</button>
                <button data-i18n="home.filters.decor" class="filter-btn font-sans text-xs md:text-sm tracking-widest uppercase border-b border-transparent text-stone-500 hover:text-stone-900 transition-all" data-category="decor">Decor</button>
            </div>
        </div>

        <!-- Responsive Grid (Dynamic Injection) -->
        <div id="product-grid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-x-8 gap-y-16">
            <!-- Products injected here by shop.js -->
        </div>

        <div class="flex justify-center mt-16">
            <a href="collection.html" class="group flex items-center gap-4 border-b border-stone-900 pb-2 text-stone-900 hover:text-stone-600 hover:border-stone-600 transition-colors">
                <span data-i18n="home.view_full" class="font-sans text-sm tracking-widest uppercase">View Full Collection</span>
                <svg class="w-4 h-4 transform group-hover:translate-x-1 transition-transform" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M17 8l4 4m0 0l-4 4m4-4H3"></path></svg>
            </a>
        </div>
    </section>

    <!-- ========================================== -->
    <!-- DYNAMIC FOOTER PLACEHOLDER -->
    <!-- ========================================== -->
    <div id="footer-container"></div>

    <!-- ========================================== -->
    <!-- SCRIPTS -->
    <!-- ========================================== -->
    <!-- 1. Load the UI components and global state FIRST (Now as a module) -->
    <script type="module" src="./js/global.js"></script>
    <!-- 2. Load page-specific logic SECOND -->
    <script type="module" src="./js/shop.js"></script>
</body>
</html>
