<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AURA | Product Details</title>
    
    <!-- Google Fonts: Playfair Display (Serif) & Inter (Sans-Serif) -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500&family=Playfair+Display:ital,wght@0,400;0,500;0,600;1,400&display=swap" rel="stylesheet">
    
    <!-- FontAwesome for Gallery Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        serif: ['"Playfair Display"', 'serif'],
                        sans: ['"Inter"', 'sans-serif'],
                    },
                    colors: {
                        cream: '#FAFAFA',
                    }
                }
            }
        }
    </script>
    <style>
        body { 
            background-color: #FAFAFA; 
            overflow-x: hidden;
        }
        /* Custom scrollbar hiding for cart drawer compatibility */
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
</head>
<body class="font-sans text-stone-900 antialiased selection:bg-stone-200 selection:text-stone-900">

    <!-- ========================================== -->
    <!-- DYNAMIC NAVBAR PLACEHOLDER -->
    <!-- ========================================== -->
    <div id="navbar-container"></div>

    <!-- Main Container where product data is injected -->
    <main id="single-product-container" class="max-w-[1400px] mx-auto px-6 md:px-12 py-24 min-h-[70vh] flex items-center justify-center">
        <div class="text-stone-500 font-sans tracking-widest uppercase text-sm animate-pulse">Loading details...</div>
    </main>

    <!-- ========================================== -->
    <!-- DYNAMIC FOOTER PLACEHOLDER -->
    <!-- ========================================== -->
    <div id="footer-container"></div>

    <!-- Global Scripts (Cart & Nav logic) -->
    <script type="module" src="./js/global.js"></script>
    
    <!-- Main Script for this specific page (Firebase & UI Rendering) -->
    <script type="module" src="./js/product.js"></script>
</body>
</html>
